<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetHealth - Reportes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../CSS/styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-pethealth">
    <div class="container-fluid">
      <a class="navbar-brand" href="../index.html">🐾 PetHealth</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="text-white small" id="nombreUsuario">👤</span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <div class="col-md-2 p-0">
        <div class="sidebar d-flex flex-column pt-3">
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="../PanelAdmin/dashboard.html"><span class="icono">🏠</span> Panel</a></li>
            <li class="nav-item"><a class="nav-link" href="../Mascotas/mascotas.html"><span class="icono">🐾</span> Mis Mascotas</a></li>
            <li class="nav-item"><a class="nav-link" href="../Eventos/eventos.html"><span class="icono">💉</span> Eventos de Salud</a></li>
            <li class="nav-item"><a class="nav-link active" href="reportes.html"><span class="icono">📊</span> Reportes</a></li>
            <li class="nav-item"><a class="nav-link" href="../Informacion/informacion.html"><span class="icono">ℹ️</span> Información</a></li>
            <li class="nav-item"><a class="nav-link" href="../Contacto/contacto.html"><span class="icono">📧</span> Contacto</a></li>
          </ul>
        </div>
      </div>

      <div class="col-md-10 p-4">
        <h4 class="fw-bold mb-4" style="color: var(--color-primario);">📊 Reportes de Salud</h4>

        <!-- Filtros -->
        <div class="card card-pethealth mb-4">
          <div class="card-header">🔍 Filtros</div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Tipo de evento</label>
                <select class="form-select" id="filtroTipo">
                  <option value="todos">Todos</option>
                  <option value="vacunas">💉 Vacunas</option>
                  <option value="desparasitaciones">🪱 Desparasitaciones</option>
                  <option value="citas">🏥 Citas veterinarias</option>
                  <option value="revisiones">🩺 Revisiones</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Mascota</label>
                <select class="form-select" id="filtroMascota">
                  <option value="">Todas las mascotas</option>
                </select>
              </div>
              <div class="col-md-2">
                <label class="form-label">Desde</label>
                <input type="date" class="form-control" id="filtroDesde" />
              </div>
              <div class="col-md-2">
                <label class="form-label">Hasta</label>
                <input type="date" class="form-control" id="filtroHasta" />
              </div>
              <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-pethealth w-100" onclick="cargarReportes()">🔍 Filtrar</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Tarjetas resumen -->
        <div class="row g-3 mb-4">
          <div class="col-md-3">
            <div class="card card-pethealth text-center p-3">
              <h3 class="fw-bold" id="resumenTotal" style="color:var(--color-primario);">—</h3>
              <p class="text-muted mb-0 small">Total eventos</p>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card card-pethealth text-center p-3">
              <h3 class="fw-bold text-success" id="resumenOk">—</h3>
              <p class="text-muted mb-0 small">✅ Al día</p>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card card-pethealth text-center p-3">
              <h3 class="fw-bold text-warning" id="resumenProximos">—</h3>
              <p class="text-muted mb-0 small">⚠️ Próximos</p>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card card-pethealth text-center p-3">
              <h3 class="fw-bold text-danger" id="resumenVencidos">—</h3>
              <p class="text-muted mb-0 small">❌ Vencidos</p>
            </div>
          </div>
        </div>

        <!-- Tabla de resultados -->
        <div class="card card-pethealth">
          <div class="card-header">📋 Resultados</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table tabla-eventos mb-0">
                <thead>
                  <tr>
                    <th>Mascota</th><th>Tipo</th><th>Fecha</th><th>Descripción</th><th>Estado</th>
                  </tr>
                </thead>
                <tbody id="tablaReportesBody"></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JS/utils.js"></script>
  <script src="../JS/auth.js"></script>
  <script src="../JS/reportes.js"></script>
</body>
</html>
